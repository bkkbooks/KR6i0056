body:
  text: 刻藥師經直解敘淨名云以一切眾生病是故我病當一切眾生病滅則我病滅大哉菩薩哀憫眾生之深慈何其至也藥師本願功德經者脫病鍵之神方活慧命之秘訣曩者我佛遊化廣嚴城詶妙吉祥之請宣明斯典逗像末之機宜自從三藏譯傳以降蕩蕩乎衣被天下緣合時熟聞持頗眾蓋以聖經簡易功悳叵大也近載有浙江古清涼沙門靈耀者消息乎止觀之場婆娑於篇籍之囿以無言言作無解解科釋是經目曰直解文光燦然自有貫斗牛之氣余因將諸家之疏反復披閱而知耀公之釋別出手眼聿輙不自揆挑點其傍付諸梓生永傳於世也夫一切眾生抱三障之錮疾受六道之輪迴不知幾經劫數青帝寶佛徹困婆心乃乘十二願輪隨緣赴感無不治之猗歟古佛慈悲之方超出上池之水也遠矣爭奈人心薄劣且無遠識其祈求也動惟以長壽富饒為念擔麻棄金寔堪慨嘆安知且遂三界之倒願漸次誘引嘉謀而旨歸皆本甚深行處而來於戲苟得其本則末自治苟失其本徒干長壽富饒等事豈不昧醫王度生本願之意也哉貞享丙寅三年孟秋望旦湖東安養律寺比丘慧堅戒山合十譔藥師經直解敘東漸聖教每多註疏如金剛楞嚴動輒百十而藥師無解何哉古人意謂秦燔經而經存漢窮經而經亡牽於曲士蔓說耳此經起盡只一三法如日月在天有目皆見直捷顯了無事解釋也余既解矣而云直者不曲之謂也曲引勉證句貼字訓而正義反晦不直矣汎扯成文播弄講口而三德全庋不直矣茲惟隨經直示體宗用法為眾生之三因即果人之三德俾造脩者可依之開解可憑之起行如日光明照見種種色而已不敢曲注蔓解以粖聖經者亦解即無解仰體古人無事解釋之意也己酉人日天台比丘靈耀書於魏塘之智證方丈藥師經直解科科分為二一總題藥師二別文三一序如是二正宗二一問二一問佛名差別爾時二問法門功德及本二答二一許說二一讚許爾時二領受唯然二正說二一答藥師琉璃佛號佛告二答本願功德法門二一正答本願功德二一詳出十二大願三一標曼殊二釋三一滅諦二願第一二道諦三願三一慧第三二定第四三戒第五三苦集七願三一先出三苦三一根缺第六二貧窮第七三女身第八二間示一集第九三重明三苦三一刑戮第十二無食十一三無衣十二三結曼殊二結示功德莊嚴三一結廣復次二示略二一依報然彼二正報於其三勸生是故二委明功德利樂二一聞修遍拔三障功德二一詳與功德三一約聞名以顯功德二一拔三毒功三一轉愚癡二一貪癡爾時二邪見復次二轉貪嫉復次三轉瞋惡復次二生二善德二一助生淨善二一深生淨土復次二淺報人天或有二女轉男身若是二約神咒以顯功德三一示意復次二正說二一入定時彼二說咒光中三結勸二一略結功德爾時二廣結勸修曼殊三約修供以顯功德二一略示功德二一修供生善德復次二傳通滅惡功三一發願通經爾時二傳通滅惡世尊三法王印可佛告二廣顯功德二一先示儀式曼殊二正明功德二一廣生善德隨所二廣滅惡功五一滅夢想諸患若復二滅情無情怖或有三滅盜賊侵擾若他四滅破戒墮惡復次五滅產難極苦或有二出功德宗本二像法別轉報障利樂三流通二出功德宗本二一示甚深本體二一直示用即深體爾時二復約三慧揀顯三一約難信顯體三一問汝為二答阿難三述成佛告二約難解顯體阿難三約難聞顯體阿難二示行願妙宗阿難二像法別轉報障利樂二一正明轉障利樂二一略明修供轉障二一正明二一出命終報苦爾時二明修供轉報時彼二結勸是故二廣明修供轉障二一廣明修供儀式二一問爾時二答二一示式救脫二結功可得二廣出所轉報障二一轉天子七難復次二轉臣民眾苦若帝二結釋轉供義意二一釋能轉所以二一正示九橫二一略明二一問爾時二答救脫二廣示二一問阿難二答二一委明初橫救脫二隨示八橫二者二結指無量是為二結須供所以復次三流通三一證護流通爾時二結名流通爾時三結益流通時薄耀僧定
